  - Monitoring
  - Observability
  - Real-Time
  - Trading Systems
apis:
  - aid: geneos:gateway-rest
    name: Geneos Gateway REST API
    description: >-
      RESTful API exposed by the Geneos Gateway for retrieving monitoring data
      and managing dataviews, samplers, entities, and snooze states
      programmatically. Authenticated and typically deployed inside
      enterprise networks.
    humanURL: >-
      https://docs.itrsgroup.com/docs/geneos/current/Gateway_Reference_Guide/gateway_rest_api.html
    tags:
      - Monitoring
      - REST
    properties:
      - type: Documentation
        url: >-
          https://docs.itrsgroup.com/docs/geneos/current/Gateway_Reference_Guide/gateway_rest_api.html
      - type: Authentication
        url: >-
          https://docs.itrsgroup.com/docs/geneos/current/Gateway_Reference_Guide/rest_api_authentication.html
  - aid: geneos:xml-rpc
    name: Geneos XML-RPC API
    description: >-
      XML-RPC interface for programmatic control of Geneos Gateway including
      executing commands, managing configuration, publishing data into
      Gateways from external samplers, and retrieving monitoring data.
    humanURL: >-
      https://docs.itrsgroup.com/docs/geneos/current/Gateway_Reference_Guide/geneos_xml-rpc_api.html
    tags:
      - Automation
      - XML-RPC
    properties:
      - type: Documentation
        url: >-
          https://docs.itrsgroup.com/docs/geneos/current/Gateway_Reference_Guide/geneos_xml-rpc_api.html
  - aid: geneos:web-dashboard
    name: Geneos Web Dashboard API
    description: >-
      API for integrating with the Geneos Web Dashboard, enabling custom
      dashboards, data visualization, and user interface extensions on top of
      Geneos monitoring data.
    humanURL: >-
      https://docs.itrsgroup.com/docs/geneos/current/Web_Dashboard/web-dashboard.html
    tags:
      - Dashboard
      - UI
      - Visualization
      - Web
    properties:
      - type: Documentation
        url: >-
          https://docs.itrsgroup.com/docs/geneos/current/Web_Dashboard/web-dashboard.html
  - aid: geneos:toolkit
    name: Geneos Toolkit API
    description: >-
      Java and Python APIs delivered through the Geneos Toolkit for building
      custom integrations, samplers, plugins, and automation scripts that
      publish data into and pull data out of Geneos.
    humanURL: >-
      https://docs.itrsgroup.com/docs/geneos/current/Toolkit/toolkit.html
    tags:
      - Java
      - Python
      - SDK
    properties:
      - type: Documentation
        url: >-
          https://docs.itrsgroup.com/docs/geneos/current/Toolkit/toolkit.html
      - type: SDK
        url: https://github.com/ITRS-Group/geneos-toolkit
      - type: GitHubOrganization
        url: https://github.com/ITRS-Group
