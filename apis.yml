aid: geneos
name: Geneos
description: >-
  Geneos is ITRS Group's real-time monitoring platform that provides
  comprehensive observability for trading systems, applications, and
  infrastructure. Widely deployed across investment banks, hedge funds, and
  exchanges, Geneos collects high-frequency telemetry from custom samplers and
  toolkits, aggregates it through Gateways, and exposes that data through
  REST, XML-RPC, streaming, and SDK interfaces for programmatic access,
  automation, and dashboarding.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
access: 3rd-Party
created: '2024-01-15'
modified: '2026-04-28'
position: Consumer
